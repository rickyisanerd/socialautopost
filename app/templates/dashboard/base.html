<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialAutoPost - {% block title %}Dashboard{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e1e4e8; }
        .nav { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
        .nav h1 { font-size: 18px; color: #58a6ff; }
        .nav a { color: #8b949e; text-decoration: none; margin-left: 20px; font-size: 14px; }
        .nav a:hover { color: #58a6ff; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
        .card h2 { font-size: 16px; margin-bottom: 12px; color: #c9d1d9; }
        .btn { display: inline-block; padding: 8px 16px; border-radius: 6px; font-size: 14px; cursor: pointer; border: none; text-decoration: none; font-weight: 500; }
        .btn-primary { background: #238636; color: #fff; }
        .btn-primary:hover { background: #2ea043; }
        .btn-danger { background: #da3633; color: #fff; }
        .btn-danger:hover { background: #f85149; }
        .btn-secondary { background: #30363d; color: #c9d1d9; }
        .btn-secondary:hover { background: #484f58; }
        .btn-blue { background: #1f6feb; color: #fff; }
        .btn-blue:hover { background: #388bfd; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 16px; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .badge-green { background: #238636; color: #fff; }
        .badge-red { background: #da3633; color: #fff; }
        .badge-yellow { background: #9e6a03; color: #fff; }
        .badge-gray { background: #484f58; color: #c9d1d9; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #30363d; font-size: 14px; }
        th { color: #8b949e; font-weight: 500; }
        input, select, textarea { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 8px 12px; border-radius: 6px; font-size: 14px; width: 100%; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #58a6ff; }
        label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 4px; margin-top: 12px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
        .stat-box { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 16px; text-align: center; }
        .stat-box .number { font-size: 28px; font-weight: 700; color: #58a6ff; }
        .stat-box .label { font-size: 12px; color: #8b949e; margin-top: 4px; }
        .platform-tag { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 12px; margin: 2px; }
        .platform-facebook { background: #1877f2; color: #fff; }
        .platform-instagram { background: #e4405f; color: #fff; }
        .platform-x { background: #000; color: #fff; border: 1px solid #30363d; }
        .platform-linkedin { background: #0a66c2; color: #fff; }
        .flash { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; }
        .flash-success { background: #1b4332; border: 1px solid #238636; color: #3fb950; }
        .flash-error { background: #3d1214; border: 1px solid #da3633; color: #f85149; }
        .empty-state { text-align: center; padding: 60px 20px; color: #8b949e; }
        .empty-state h3 { margin-bottom: 8px; color: #c9d1d9; }
    </style>
</head>
<body>
    <nav class="nav">
        <h1>SocialAutoPost</h1>
        <div>
            <a href="/dashboard">Dashboard</a>
            <a href="/dashboard/add-business">+ Add Business</a>
            <a href="/logout" style="color: #f85149;">Logout</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
